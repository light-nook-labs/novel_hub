name: Deploy SSG to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python deps
        run: uv sync

      - name: Install Node deps
        run: pnpm install

      - name: Build Tailwind CSS
        run: pnpm build

      - name: Download release data
        run: |
          gh release download v1.1.0 \
            --repo light-nook-labs/novel_hub \
            --pattern '*.tar.gz' \
            --dir /tmp/release
          mkdir -p release
          tar -xzf /tmp/release/*.tar.gz -C . --strip-components=0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load data into SQLite
        working-directory: website
        run: |
          DB_TYPE=sqlite uv run python manage.py migrate --run-syncdb
          DB_TYPE=sqlite uv run python manage.py load_jsonl ../release/dataset/meta_01.jsonl

      - name: Generate static pages
        working-directory: website
        run: |
          DB_TYPE=sqlite uv run python manage.py generate_static \
            --output ../static_build \
            --index-pages 10 \
            --rank-pages 50 \
            --base-path novel_hub

      - name: Add .nojekyll
        run: touch static_build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static_build
          publish_branch: gh-pages
