name: sfacg-metadata-crawler-beta

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync

      - name: Execute scrapy spider and save log
        run: uv run scrapy crawl meta_spider -o meta.jsonl 2>&1 | tee crawler.log

      - name: Commit and push output file to workflows branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add -f meta.jsonl crawler.log
          git commit -m "Auto update data and log"
          git push origin HEAD:workflows
