name: sfacg-metadata-crawler-beta

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      begin:
        description: "Start page number"
        required: false
        default: ""
      num:
        description: "Number"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write 
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Echo variables at start
        run: |
          echo "inputs.begin: ${{ inputs.begin }}"
          echo "inputs.num: ${{ inputs.num }}"
          echo "vars.BEGIN: ${{ vars.BEGIN }}"
          echo "vars.NUM: ${{ vars.NUM }}"

      - name: Run spider
        run: |
          set -o pipefail
          mkdir -p output
          if [ -n "${{ inputs.begin }}" ] && [ -n "${{ inputs.num }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -a num=${{ inputs.num }} -o output/meta.jsonl
          elif [ -n "${{ inputs.begin }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -o output/meta.jsonl
          elif [ -n "${{ inputs.num }}" ]; then
            uv run scrapy crawl meta_spider -a num=${{ inputs.num }} -o output/meta.jsonl
          else
            uv run scrapy crawl meta_spider -a begin=${{ vars.BEGIN }} -a num=${{ vars.NUM }} -o output/meta.jsonl
          fi

      - name: Update BEGIN = BEGIN + NUM
        if: ${{ github.event_name == 'schedule' || inputs.begin == '1' }}
        run: |
          NEW_BEGIN=$(( ${{ vars.BEGIN }} + ${{ vars.NUM }} ))
          gh variable set BEGIN -b $NEW_BEGIN

      - name: Echo variables at end
        run: |
          echo "inputs.begin: ${{ inputs.begin }}"
          echo "inputs.num: ${{ inputs.num }}"
          echo "vars.BEGIN: ${{ vars.BEGIN }}"
          echo "vars.NUM: ${{ vars.NUM }}"

      - name: Commit and push to workflow branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git checkout -B data-branch
          git add output/meta.jsonl
          git commit -m "Auto update" --allow-empty
          git push -f origin data-branch