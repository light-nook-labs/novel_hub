name: sfacg-metadata-crawler-beta

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      begin:
        description: "Start page number"
        required: false
        default: ""
      num:
        description: "Number"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare data-branch
        run: |
          git fetch origin
          git checkout -B data-branch origin/main || git checkout -B data-branch
          git reset --hard origin/main

      - name: Read BEGIN
        run: |
          if [ -f BEGIN.txt ]; then
            echo "BEGIN=$(cat BEGIN.txt)" >> "$GITHUB_ENV"
          else
            echo "BEGIN=1" >> "$GITHUB_ENV"
          fi
          echo "NUM=5" >> "$GITHUB_ENV"

      - name: Echo variables at start
        run: |
          echo "inputs.begin: ${{ inputs.begin }}"
          echo "inputs.num: ${{ inputs.num }}"
          echo "BEGIN: ${{ env.BEGIN }}"
          echo "NUM: ${{ env.NUM }}"

      - name: Run spider
        run: |
          set -o pipefail
          mkdir -p output
          if [ -n "${{ inputs.begin }}" ] && [ -n "${{ inputs.num }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -a num=${{ inputs.num }} -o output/meta.jsonl
          elif [ -n "${{ inputs.begin }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -o output/meta.jsonl
          elif [ -n "${{ inputs.num }}" ]; then
            uv run scrapy crawl meta_spider -a num=${{ inputs.num }} -o output/meta.jsonl
          else
            uv run scrapy crawl meta_spider -a begin=${{ env.BEGIN }} -a num=${{ env.NUM }} -o output/meta.jsonl
          fi

      - name: Update BEGIN
        if: ${{ github.event_name == 'schedule' || inputs.begin == '1' }}
        run: |
          NEW_BEGIN=$(( ${{ env.BEGIN }} + ${{ env.NUM }} ))
          echo $NEW_BEGIN > BEGIN.txt

      - name: Echo variables at end
        run: |
          echo "inputs.begin: ${{ inputs.begin }}"
          echo "inputs.num: ${{ inputs.num }}"
          echo "BEGIN: ${{ env.BEGIN }}"
          echo "NUM: ${{ env.NUM }}"

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add output/meta.jsonl BEGIN.txt
          git commit -m "Auto update" --allow-empty
          git push -f origin data-branch

      - name: Create PR
        run: |
          gh pr create --base main --head data-branch --title "Auto update data" --body "Auto generated PR" || true
