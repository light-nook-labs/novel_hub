name: sfacg-metadata-crawler-beta

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      begin:
        description: "Start page number"
        required: false
        default: ""
      num:
        description: "Number"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run spider
        run: |
          set -o pipefail
          mkdir -p output
          if [ -n "${{ inputs.begin }}" ] && [ -n "${{ inputs.num }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -a num=${{ inputs.num }} -o output/meta.jsonl
          elif [ -n "${{ inputs.begin }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -o output/meta.jsonl
          elif [ -n "${{ inputs.num }}" ]; then
            uv run scrapy crawl meta_spider -a num=${{ inputs.num }} -o output/meta.jsonl
          else
            uv run scrapy crawl meta_spider -a begin=${{ vars.BEGIN }} -a num=${{ vars.NUM }} -o output/meta.jsonl
          fi

      - name: Update BEGIN variable +5
        if: ${{ inputs.begin == '' }}
        run: |
          NEW_BEGIN=$(({{ vars.BEGIN }} + 5))
          gh variable set BEGIN -b $NEW_BEGIN

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto-update
          title: Auto update metadata
          body: "Auto-generated PR from GitHub Actions"
          commit-message: "Auto update"
