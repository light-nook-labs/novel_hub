name: sfacg-metadata-crawler

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      begin:
        description: "Start page number"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run spider
        run: |
          set -o pipefail
          if [ -n "${{ inputs.begin }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -o meta.jsonl 2>&1 | tee crawler_log.txt
          else
            uv run scrapy crawl meta_spider -a begin=${{ vars.BEGIN }} -o meta.jsonl 2>&1 | tee crawler_log.txt
          fi

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto update" --allow-empty
          git push -f origin HEAD:workflows