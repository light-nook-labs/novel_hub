name: sfacg-metadata-crawler

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      begin:
        description: "Start page number"
        required: false
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run spider
        run: |
          if [ -n "${{ inputs.begin }}" ]; then
            uv run scrapy crawl meta_spider -a begin=${{ inputs.begin }} -o meta.jsonl 2>&1 | tee crawler_log.txt
            echo "CURRENT_BEGIN=${{ inputs.begin }}" >> $GITHUB_ENV
          else
            uv run scrapy crawl meta_spider -a begin=${{ vars.BEGIN }} -o meta.jsonl 2>&1 | tee crawler_log.txt
            echo "CURRENT_BEGIN=${{ vars.BEGIN }}" >> $GITHUB_ENV
          fi

      - name: Increase page by 500
        run: |
          NEW_BEGIN=$(( ${{ env.CURRENT_BEGIN }} + 500 ))
          echo "NEW_BEGIN=$NEW_BEGIN" >> $GITHUB_ENV

      - name: Update BEGIN variable
        run: gh variable set BEGIN --body ${{ env.NEW_BEGIN }}

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Auto update"
          git push -f origin HEAD:workflows
