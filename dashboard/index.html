<script>
document.addEventListener('DOMContentLoaded', function() {
  var isDark = document.documentElement.classList.contains('dark');
  var darkFont = isDark ? '#d1d5db' : '#374151';
  var darkGrid = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(128,128,128,0.2)';

  var plotlyConfig = {
    responsive: true,
    displayModeBar: false,
    staticPlot: false
  };

  var charts = document.querySelectorAll('.plotly-chart');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var div = entry.target;
        var data = JSON.parse(div.dataset.plotly);

        // Apply dark mode colors to layout
        if (data.layout) {
          data.layout.paper_bgcolor = 'rgba(0,0,0,0)';
          data.layout.plot_bgcolor = 'rgba(0,0,0,0)';
          if (data.layout.font) data.layout.font.color = darkFont;
          if (data.layout.xaxis) data.layout.xaxis.gridcolor = darkGrid;
          if (data.layout.xaxis) data.layout.xaxis.color = darkFont;
          if (data.layout.yaxis) data.layout.yaxis.gridcolor = darkGrid;
          if (data.layout.yaxis) data.layout.yaxis.color = darkFont;
          if (data.layout.yaxis2) data.layout.yaxis2.gridcolor = darkGrid;
          if (data.layout.yaxis2) data.layout.yaxis2.color = darkFont;
          if (data.layout.legend) data.layout.legend.font = {color: darkFont};
        }

        Plotly.newPlot(div, data.data, data.layout, plotlyConfig);
        observer.unobserve(div);
      }
    });
  }, {rootMargin: '200px'});

  charts.forEach(function(chart) {
    observer.observe(chart);
  });
});
</script>
