{% extends "novels/base.html" %}

{% block title %}评论 - {{ TOML.site.name }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">评论</h1>

  <div class="prose prose-gray dark:prose-invert max-w-none mb-8">
    <p class="text-gray-600 dark:text-gray-400">
      欢迎在下方评论区分享你的想法、建议或反馈。评论系统基于
      <a href="https://giscus.app" target="_blank" class="text-amber-600 dark:text-amber-400 hover:underline">GISCUS</a>，
      使用 GitHub Discussions 作为后端。
    </p>
  </div>

  <!-- Task Collection Section -->
  <div class="mb-8">
    <h2 class="text-lg font-semibold mb-3">提交任务</h2>
    <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">
      提交一个小说 ID 以修复数据问题（如重复封面、缺失信息等）。系统会自动处理并更新。
    </p>
    <form id="task-form" class="flex gap-3">
      <input
        type="number"
        id="task-nid"
        placeholder="输入小说 ID"
        min="10000"
        max="9999999"
        step="1"
        required
        inputmode="numeric"
        pattern="\d{5,7}"
        title="请输入 5-7 位纯数字的小说 ID"
        class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-amber-500 focus:border-transparent [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
      >
      <button
        type="submit"
        class="px-6 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg transition-colors"
      >
        提交
      </button>
    </form>
    <p class="mt-2 text-xs text-gray-500 dark:text-gray-400">仅支持 5-7 位纯数字的小说 ID（10000-9999999）</p>
    <div id="task-result" class="mt-3 text-sm hidden"></div>
  </div>

  <!-- GISCUS Comments Section -->
  <div>
    <h2 class="text-lg font-semibold mb-3">评论区</h2>
    <div id="giscus-container"></div>
  </div>
</div>

<script>
function loadGiscus() {
  var container = document.getElementById('giscus-container');
  if (!container) return;

  // Clear existing content
  container.innerHTML = '';

  var isDark = document.documentElement.classList.contains('dark');
  var script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo', 'light-nook-labs/novel_hub');
  script.setAttribute('data-repo-id', 'R_kgDOSQm3uQ');
  script.setAttribute('data-category', 'General');
  script.setAttribute('data-category-id', 'DIC_kwDOSQm3uc4C_Hbp');
  script.setAttribute('data-mapping', 'pathname');
  script.setAttribute('data-strict', '0');
  script.setAttribute('data-reactions-enabled', '1');
  script.setAttribute('data-emit-metadata', '0');
  script.setAttribute('data-input-position', 'bottom');
  script.setAttribute('data-theme', isDark ? 'dark' : 'light');
  script.setAttribute('data-lang', 'zh-CN');
  script.setAttribute('crossorigin', 'anonymous');
  script.async = true;
  container.appendChild(script);
}

document.addEventListener('DOMContentLoaded', function() {
  // Initial load
  loadGiscus();

  // Listen for theme changes from main.js
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      if (mutation.attributeName === 'class') {
        // Theme changed, reload GISCUS
        loadGiscus();
      }
    });
  });

  observer.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['class']
  });

  // Task form submission
  var form = document.getElementById('task-form');
  var resultDiv = document.getElementById('task-result');
  var input = document.getElementById('task-nid');

  if (form && input) {
    // Real-time validation feedback
    input.addEventListener('input', function() {
      var val = input.value;
      var isValid = /^\d{5,7}$/.test(val) && parseInt(val) >= 10000 && parseInt(val) <= 9999999;
      input.setCustomValidity(isValid || val === '' ? '' : '请输入 5-7 位纯数字');
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var nid = input.value.trim();

      if (!nid) {
        showResult('请输入小说 ID', 'error');
        input.focus();
        return;
      }

      // Strict validation
      if (!/^\d{5,7}$/.test(nid)) {
        showResult('ID 格式错误：仅支持 5-7 位纯数字', 'error');
        input.focus();
        return;
      }

      var num = parseInt(nid, 10);
      if (num < 10000 || num > 9999999) {
        showResult('ID 超出范围：应为 10000-9999999', 'error');
        input.focus();
        return;
      }

      // Use GitHub issue template
      var url = 'https://github.com/light-nook-labs/novel_hub/issues/new?' +
        'template=task.yml&' +
        'title=' + encodeURIComponent('[Task] 小说 ID: ' + nid) + '&' +
        'novel-id=' + encodeURIComponent(nid);

      window.open(url, '_blank');
      showResult('已跳转到 GitHub，请提交 Issue', 'success');
      input.value = '';
    });
  }

  function showResult(message, type) {
    resultDiv.textContent = message;
    resultDiv.className = 'mt-3 text-sm ' +
      (type === 'error' ? 'text-red-600 dark:text-red-400' : 'text-green-600 dark:text-green-400');
    resultDiv.classList.remove('hidden');
  }
});
</script>
{% endblock %}
