{% load novel_tags %}
<div class="card card-hover group">
  <a href="{% if static_mode %}{% novel_url novel.id %}{% else %}{% url 'novels:detail' novel.id %}{% endif %}"{% if static_mode %} target="_blank"{% endif %} class="block">
    <div class="relative bg-gradient-to-br from-amber-300 to-orange-300">
      <img src="{{ novel.cover|cover_url }}" alt="{{ novel.title }}" class="w-full h-auto group-hover:scale-105 transition-transform duration-300">
    </div>
  </a>
  <div class="p-2">
    <a href="{% if static_mode %}{% novel_url novel.id %}{% else %}{% url 'novels:detail' novel.id %}{% endif %}"{% if static_mode %} target="_blank"{% endif %} class="block">
      <h3 class="text-[10px] md:text-sm font-bold truncate group-hover:text-amber-600 dark:group-hover:text-amber-400 transition-colors">{{ novel.title }}</h3>
    </a>
    <p class="hidden md:block text-secondary mt-0.5 truncate">{{ novel.author|default:"未知" }}</p>
    <div class="hidden md:flex items-center gap-1 mt-1">
      <span class="badge badge-sm badge-square {% if novel.status == 2 %}badge-finished{% elif novel.status == 3 %}badge-ongoing{% elif novel.status == 5 %}badge-active-d{% elif novel.status == 6 %}badge-active-f{% else %}badge-died{% endif %}">
        {{ novel.get_status_display }}
      </span>
      <span class="badge badge-sm badge-square badge-genre">
        {{ novel.get_genre_display }}
      </span>
    </div>
  </div>
</div>
