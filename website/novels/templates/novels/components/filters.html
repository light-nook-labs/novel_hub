{% load novel_tags %}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-3">
  <div class="flex flex-wrap items-center gap-2 text-sm">
    <span class="text-gray-500 dark:text-gray-400 font-medium">分类：</span>
    <a href="?{% if current_status %}status={{ current_status }}&{% endif %}{% if current_ptype %}ptype={{ current_ptype }}&{% endif %}{% if current_sort %}sort={{ current_sort }}{% endif %}"
       class="px-2 py-1 rounded {% if not current_genre %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">全部</a>
    {% for g in genres %}
    <a href="?genre={{ g.value }}{% if current_status %}&status={{ current_status }}{% endif %}{% if current_ptype %}&ptype={{ current_ptype }}{% endif %}{% if current_sort %}&sort={{ current_sort }}{% endif %}"
       class="px-2 py-1 rounded {% if current_genre == g.value|stringformat:'d' %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">{{ g.label }}</a>
    {% endfor %}
  </div>
  <div class="flex flex-wrap items-center gap-2 text-sm mt-2">
    <span class="text-gray-500 dark:text-gray-400 font-medium">状态：</span>
    <a href="?{% if current_genre %}genre={{ current_genre }}&{% endif %}{% if current_ptype %}ptype={{ current_ptype }}&{% endif %}{% if current_sort %}sort={{ current_sort }}{% endif %}"
       class="px-2 py-1 rounded {% if not current_status %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">全部</a>
    {% for s in statuses %}
    <a href="?{% if current_genre %}genre={{ current_genre }}&{% endif %}status={{ s.value }}{% if current_ptype %}&ptype={{ current_ptype }}{% endif %}{% if current_sort %}&sort={{ current_sort }}{% endif %}"
       class="px-2 py-1 rounded {% if current_status == s.value|stringformat:'d' %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">{{ s.label }}</a>
    {% endfor %}
    <span class="text-gray-300 dark:text-gray-600 mx-1">|</span>
    <span class="text-gray-500 dark:text-gray-400 font-medium">类型：</span>
    <a href="?{% if current_genre %}genre={{ current_genre }}&{% endif %}{% if current_status %}status={{ current_status }}&{% endif %}{% if current_sort %}sort={{ current_sort }}{% endif %}"
       class="px-2 py-1 rounded {% if not current_ptype %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">全部</a>
    {% for p in ptypes %}
    <a href="?{% if current_genre %}genre={{ current_genre }}&{% endif %}{% if current_status %}status={{ current_status }}&{% endif %}ptype={{ p.value }}{% if current_sort %}&sort={{ current_sort }}{% endif %}"
       class="px-2 py-1 rounded {% if current_ptype == p.value|stringformat:'d' %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">{{ p.label }}</a>
    {% endfor %}
  </div>
  <div class="flex flex-wrap items-center gap-2 text-sm mt-2">
    <span class="text-gray-500 dark:text-gray-400 font-medium">排序：</span>
    {% for key, label in sort_options.items %}
    <a href="?{% if current_genre %}genre={{ current_genre }}&{% endif %}{% if current_status %}status={{ current_status }}&{% endif %}{% if current_ptype %}ptype={{ current_ptype }}&{% endif %}sort={{ key }}"
       class="px-2 py-1 rounded {% if current_sort == key %}bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300{% else %}text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %} transition-colors">{{ label }}</a>
    {% endfor %}
  </div>
</div>
