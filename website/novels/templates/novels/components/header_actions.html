{# Header actions: search, theme toggle, mobile menu, GitHub. Set no_dark=1 to disable dark: classes #}
<div class="flex items-center gap-2">
  {# Search #}
  <div id="search-wrap" class="relative flex items-center">
    <button type="button" id="search-toggle" class="btn-icon" aria-label="搜索">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </button>
    {# Mobile: full-width overlay, desktop: inline expandable #}
    <form id="search-form" method="get" action="{% url 'novels:index' %}"
          class="hidden fixed inset-x-0 top-0 z-[60] flex items-center px-4 py-2 bg-gradient-to-r from-amber-200 to-orange-200{% if not no_dark %} dark:from-amber-900 dark:to-orange-900{% endif %} shadow-md md:absolute md:right-0 md:top-1/2 md:-translate-y-1/2 md:inset-auto md:z-auto md:shadow-none md:bg-none md:from-transparent md:to-transparent md:p-0">
      <input type="text" name="q" value="{{ request.GET.q|default:'' }}"
             placeholder="搜索小说..."
             class="input-search w-full md:w-64 h-9 text-sm">
      <button type="submit" class="absolute right-6 md:right-2 top-1/2 -translate-y-1/2 text-gray-500{% if not no_dark %} dark:text-gray-400{% endif %} hover:text-gray-800{% if not no_dark %} dark:hover:text-gray-100{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </button>
    </form>
  </div>

  {# Theme toggle #}
  <button id="theme-toggle" class="btn-icon" aria-label="切换主题">
    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>

  {# Mobile menu #}
  <div class="relative md:hidden">
    <button id="menu-toggle" class="btn-icon" aria-label="菜单">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <div id="menu-dropdown" onclick="event.stopPropagation()" class="hidden absolute right-0 mt-2 w-48 bg-white{% if not no_dark %} dark:bg-gray-800{% endif %} rounded-lg shadow-lg border border-gray-200{% if not no_dark %} dark:border-gray-700{% endif %} z-50">
      <a href="{% url 'novels:rank' %}" class="dropdown-item rounded-t-lg">排行榜</a>
      <button onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('hidden'); this.querySelector('svg').classList.toggle('rotate-180')" class="flex items-center justify-between w-full px-4 py-2 text-sm text-gray-700{% if not no_dark %} dark:text-gray-300{% endif %} hover:bg-gray-100{% if not no_dark %} dark:hover:bg-gray-700{% endif %}">
        浏览
        <svg class="w-3.5 h-3.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div class="hidden">
        <a href="{% url 'novels:genres' %}" class="block px-8 py-2 text-sm text-gray-600{% if not no_dark %} dark:text-gray-400{% endif %} hover:bg-gray-100{% if not no_dark %} dark:hover:bg-gray-700{% endif %}">分类</a>
        <a href="{% url 'novels:statuses' %}" class="block px-8 py-2 text-sm text-gray-600{% if not no_dark %} dark:text-gray-400{% endif %} hover:bg-gray-100{% if not no_dark %} dark:hover:bg-gray-700{% endif %}">状态</a>
        <a href="{% url 'novels:ptypes' %}" class="block px-8 py-2 text-sm text-gray-600{% if not no_dark %} dark:text-gray-400{% endif %} hover:bg-gray-100{% if not no_dark %} dark:hover:bg-gray-700{% endif %}">类型</a>
        <a href="{% url 'novels:tags' %}" class="block px-8 py-2 text-sm text-gray-600{% if not no_dark %} dark:text-gray-400{% endif %} hover:bg-gray-100{% if not no_dark %} dark:hover:bg-gray-700{% endif %}">标签</a>
        <a href="{% url 'novels:contests' %}" class="block px-8 py-2 text-sm text-gray-600{% if not no_dark %} dark:text-gray-400{% endif %} hover:bg-gray-100{% if not no_dark %} dark:hover:bg-gray-700{% endif %}">征文</a>
      </div>
      <a href="{% url 'novels:authors' %}" class="dropdown-item">作者</a>
      <a href="{% url 'novels:banners' %}" class="dropdown-item rounded-b-lg">Banner</a>
    </div>
  </div>

  {# GitHub - far right #}
  <a href="{{ TOML.site.github_url }}" target="_blank" rel="noopener noreferrer"
     class="btn-icon" aria-label="GitHub">
    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
    </svg>
  </a>
</div>
