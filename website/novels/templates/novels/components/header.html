{% load static %}
<header class="bg-green-800 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-8">
        <a href="{% url 'novels:index' %}" class="text-xl font-bold tracking-tight hover:text-amber-400 transition-colors">
          Novel Hub
        </a>
        <nav class="hidden md:flex items-center gap-6 text-sm">
          <a href="{% url 'novels:index' %}" class="hover:text-amber-400 transition-colors">全部小说</a>
          <a href="{% url 'novels:rank' %}" class="hover:text-amber-400 transition-colors">排行榜</a>
          <a href="{% url 'novels:enum_list' 'genre' %}" class="hover:text-amber-400 transition-colors">分类</a>
          <a href="{% url 'novels:authors' %}" class="hover:text-amber-400 transition-colors">作者</a>
          <a href="{% url 'novels:tags' %}" class="hover:text-amber-400 transition-colors">标签</a>
          <a href="{% url 'novels:contests' %}" class="hover:text-amber-400 transition-colors">征文</a>
        </nav>
      </div>

      <form action="{% url 'novels:index' %}" method="get" class="flex-1 max-w-md mx-4">
        <div class="relative">
          <input type="text" name="q" value="{{ request.GET.q|default:'' }}"
                 placeholder="搜索小说..."
                 class="w-full px-4 py-2 bg-green-700 text-white placeholder-green-300 border border-green-600 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent">
          <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-green-300 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
        </div>
      </form>

      <div class="flex items-center gap-4">
        <a href="{% url 'admin:index' %}" class="text-sm bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded-lg transition-colors">
          Admin
        </a>
      </div>
    </div>
  </div>
</header>
