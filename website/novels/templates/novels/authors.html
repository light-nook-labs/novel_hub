{% extends "novels/base.html" %}

{% block title %}作者 - {{ TOML.site.name }}{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold">作者</h1>
  <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">共 {{ paginator.count }} 位作者</p>
</div>

<div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
  {% for author in authors %}
  <a href="{% url 'novels:author_detail' author.id %}"
     class="bg-white dark:bg-gray-800 rounded-lg shadow p-3 hover:shadow-md transition-shadow">
    <p class="font-medium text-gray-900 dark:text-gray-100 truncate">{{ author.name }}</p>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">{{ author.novel_count }} 本</p>
  </a>
  {% empty %}
  <div class="col-span-full text-center py-12 text-gray-400 dark:text-gray-500">暂无数据</div>
  {% endfor %}
</div>
{% endblock %}
