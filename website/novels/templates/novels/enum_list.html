{% extends "novels/base.html" %}

{% block title %}{{ enum_label }} - Novel Hub{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold">{{ enum_label }}</h1>
</div>

<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
  {% for item in items %}
  <a href="{% url 'novels:enum_detail' enum_type item.value %}"
     class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 hover:shadow-md transition-shadow text-center">
    <p class="font-medium text-gray-900 dark:text-gray-100">{{ item.label }}</p>
  </a>
  {% endfor %}
</div>
{% endblock %}
