{% extends "novels/base.html" %}

{% block title %}征文 - Novel Hub{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold">征文</h1>
  <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">共 {{ paginator.count }} 个征文活动</p>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for contest in contests %}
  <a href="{% url 'novels:contest_detail' contest.id %}"
     class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 hover:shadow-md transition-shadow">
    <p class="font-medium text-gray-900 dark:text-gray-100 truncate">{{ contest.name }}</p>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">{{ contest.novel_count }} 本</p>
  </a>
  {% empty %}
  <div class="col-span-full text-center py-12 text-gray-400">暂无数据</div>
  {% endfor %}
</div>
{% endblock %}
